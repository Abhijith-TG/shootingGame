<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="width:100%">
    
    <div id="playground">
        <h1 id="mark" style=" color:white;" >0</h1>
        <div id="enemy"  ></div>
        <div  id="player" tabindex="0" ></div>
    </div>
    <div class="over" >
        <h1 style=" color:white; text-align:center;" >Game Over</h1>
         <h1 id="marks" style=" color:white;" >0</h1>

    </div>
    <div style="display: flex; justify-content: space-between; width: 100%;">

        <div class="control-section" >
            
            
            <div class="control">
                <div id="a_key" >A</div>
                <div id="d_key">S</div>
                
            </div>
        </div>
        <div class="control-section" >
            
            <div class="control"></div>
            <div id="w_key" >W</div>
        </div>
        
    </div>
</div>

    
    <script src="script.js" ></script>
</body>
</html>
