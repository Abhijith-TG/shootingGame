<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="playground">
        <h1 id="mark" style=" color:white;" >0</h1>
        <div id="enemy"  ></div>
        <div  id="player" tabindex="0" ></div>
    </div>
    <div class="over items-center justify-center gap-4" >
        <h1 style=" color:white; text-align:center;" >Game Over</h1>
         <h1 id="marks" style=" color:white;" >0</h1>

         <h1 id="high" style=" color:white;" >Past High Score: </h1>

         <button type="button" id="restartBtn" class="text-black bg-white mt-10 px-4 py-1">Restart</button>

    </div>
    <div class=" flex mt-10 justify-around items-center w-full sm:hidden">

            
            
            <div class="flex gap-5">
                <div id="a_key"  >
                    <div class="w-8 h-8 bg-green-300 hover:bg-green-900">

                    </div>
                </div>
                <div id="d_key">
                    <div class="w-8 h-8 bg-green-300 hover:bg-green-900">

                    </div>
                </div>
                
            </div>
        <div class="" >
            
            <div id="w_key" >
                <div class="w-8 h-8 bg-red-300 hover:bg-red-900">

                    </div>
            </div>
        
    </div>
</div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" ></script>
</body>
</html>
